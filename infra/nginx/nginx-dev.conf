server {
  listen 38080;
  server_name _;

  index  index.html index.htm;
  include /etc/nginx/mime.types;

  location / {
        proxy_pass http://joker-dev:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /documents/ {
        proxy_pass http://mona-dev:8000/documents/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /_astro {
        proxy_pass http://fox-dev:4321;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /docs {
        proxy_pass http://fox-dev:4321;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }

  # in development mode, fox provides images url as /fox/api/documents/{doc_id}/images/{image_name}
  # so we need to proxy /fox to fox-dev.
  # nginx remove /fox prefix, because fox api route receives requests to /api/documents/...
  location /fox {
        rewrite ^/fox(/.*)$ $1 break;
        proxy_pass http://fox-dev:4321;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /navi/ {
        proxy_pass http://navi-dev:8000/navi/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /skull/ {
        proxy_pass http://skull-dev:3000/skull/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }
}
