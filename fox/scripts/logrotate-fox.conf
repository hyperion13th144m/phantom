# Fox Application Access Log Rotation Configuration
/var/log/fox/fox.log {
    # ローテーション間隔：ファイルサイズベース（128kb）
    size 128k
    
    # 5世代保持
    rotate 5
    
    # 圧縮設定
    compress
    delaycompress
    
    # ログファイルが存在しない場合でもエラーを出さない
    missingok
    
    # ローテーション時に新しいファイルを作成
    create 0644 root root
    
    # ローテーション後にシグナルを送信（必要に応じて）
    # sharedscripts
    postrotate
        # アプリケーションが必要に応じてここでログを再初期化
    endscript
}
