services:
  fox-dev:
    container_name: fox-dev
    image: node:24-bookworm
    environment:
      NODE_ENV: development
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_FOX}:/var/log/fox
    networks:
      - dev-net

  joker-dev:
    container_name: joker-dev
    image: node:24-bookworm
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
      - ${DATA_DIR}:/data-dir
      - ${EXTRA_DATA_DIR}:/extra-dir
    environment:
      NODE_ENV: development
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es01-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      NEXT_PUBLIC_IMAGE_BASE_URL: /images
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /docs
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
    networks:
      - dev-net

  es01-dev:
    image: phantom-elasticsearch
    container_name: phantom-elasticsearch-dev
    build:
      dockerfile: docker/Dockerfile.es
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data-dev:/usr/share/elasticsearch/data
    networks:
      - dev-net
    ports:
      - 9200:9200
    restart: always

  nginx-dev:
    container_name: nginx-dev
    image: nginx-dev
    build:
      context: docker/nginx
      dockerfile: Dockerfile.dev
    volumes:
      - ${DATA_DIR}:/usr/share/nginx/html
    ports:
      - 38080:38080
    networks:
      - dev-net

volumes:
  es-data-dev:

networks:
  dev-net:
    name: phantom-dev-net
    driver: bridge
