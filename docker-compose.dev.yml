services:
  mona-dev:
    container_name: mona-dev
    image: mona-dev
    build:
      context: mona
      dockerfile: Dockerfile.dev
    volumes:
      - ${SRC_DIR}:/src_dir
      - ${DATA_DIR}:/data_dir
      - .:/workspaces:cached
    tty: true
    environment:
      SRC_DIR: /src_dir
      DATA_DIR: /data_dir
    networks:
      - dev-net
  
  panther-dev:
    container_name: panther-dev
    image: python:3.14-bookworm
    #image: panther-dev
    #build:
    #  context: panther
    #  dockerfile: Dockerfile.dev
    volumes:
      - ${DATA_DIR}:/data_dir
      - ${EXTRA_DATA_DIR}:/extra_dir
      - .:/workspaces:cached
    tty: true
    environment:
      DATA_DIR: /data_dir
      ES_URL: http://es01-dev:9200
      ES_USER: ${ELASTIC_USER}
      ES_PASSWORD: ${ELASTIC_PASSWORD}
    networks:
      - dev-net

  queen-dev:
    container_name: queen-dev
    image: queen-dev
    build:
      context: queen
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspaces:cached
    tty: true
    restart: always
    networks:
      - dev-net

    #environment:
    #  GROONGA_URL: http://groonga-dev:10041/d
    #ports:
    #  - 28000:8000
 
  fox-dev:
    container_name: fox-dev
    image: fox-dev
    build:
      context: fox
      dockerfile: Dockerfile.dev
    tty: true
    volumes:
      - .:/workspaces:cached
      - ${DATA_DIR}:/workspaces/fox/public/content
    networks:
      - dev-net

  joker-dev:
    container_name: joker-dev
    image: joker-dev
    build:
      context: joker
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspaces:cached
    environment:
      ES_URL: http://es01-dev:9200
      ES_USER: ${ELASTIC_USER}
      ES_PASSWORD: ${ELASTIC_PASSWORD}
      IMAGE_BASE_URL: http://192.168.11.250:38080/content
      DOCUMENT_BASE_URL: http://192.168.11.250:38080/docs
    tty: true
    networks:
      - dev-net

  es01-dev:
    image: phantom-lasticsearch
    container_name: phantom-elasticsearch-dev
    build:
      context: elasticsearch
      dockerfile: Dockerfile
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data-dev:/usr/share/elasticsearch/data
    networks:
      - dev-net
    restart: always


  nginx-dev:
    container_name: nginx-dev
    image: nginx-dev
    build:
      context: nginx
      dockerfile: Dockerfile.dev
    volumes:
      - ${WWW_ROOT}:/usr/share/nginx/html
    ports:
      - ${DEV_NGINX_PORT}:38080
    networks:
      - dev-net

volumes:
  es-data-dev:

networks:
  dev-net:
    name: phantom-dev-net
    driver: bridge
