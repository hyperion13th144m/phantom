services:
  crow-dev:
    container_name: crow-dev
    build:
      context: services
      dockerfile: crow/Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR: /var/log/crow
      NAVI_ORCHESTRATION_WEBHOOK_URL: ${NAVI_ORCHESTRATION_WEBHOOK_URL:-http://navi-dev:8000/orchestration/crow-completed}
      NAVI_ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS: ${NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS:-5}
    volumes:
      - ${SRC_DIR}:/src-dir:ro
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_CROW}:/var/log/crow
    networks:
      - dev-net

  mona-dev:
    container_name: mona-dev
    build:
      context: services/mona
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR}:/data-dir:ro
      - ${LOG_DIR_MONA}:/var/log/mona
    networks:
      - dev-net

  navi-dev:
    container_name: navi-dev
    build:
      context: services/navi
      dockerfile: Dockerfile
    environment:
      CROW_URL: http://crow-dev:8000
      PANTHER_URL: http://panther-dev:8000
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
    volumes:
      - ${LOG_DIR_NAVI}:/var/log/navi
    networks:
      - dev-net


  noir-dev:
    container_name: noir-dev
    build:
      context: services/noir
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${LOG_DIR_NOIR}:/var/log/noir
    networks:
      - dev-net

  panther-dev:
    container_name: panther-dev
    build:
      context: services/panther
      dockerfile: Dockerfile
    environment:
      MONA_URL: http://mona-dev:8000
      ES_URL: http://es-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_PANTHER}:/var/log/panther
    networks:
      - dev-net

  fox-dev:
    container_name: fox-dev
    build:
      context: services/fox
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      ES_URL: http://es-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      MONA_URL: http://mona-dev:8000
      JOKER_PATH: /joker
    volumes:
      - ${LOG_DIR_FOX}:/var/log/fox
    networks:
      - dev-net

  joker-dev:
    container_name: joker-dev
    build:
      context: services/joker
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_IMAGE_BASE_URL: /images
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /docs

      # only needed for development environment.
      MONA_URL: http://mona-dev:8000
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
    networks:
      - dev-net

  skull-dev:
    container_name: skull-dev
    build:
      context: services/skull
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_IMAGE_BASE_URL: /images
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /docs
      NEXT_PUBLIC_APP_URL: http://skull-dev:3000/skull
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
    volumes:
      - ${LOG_DIR_SKULL}:/var/log/skull
      - ${EXTRA_DATA_DIR}:/extra-dir
    networks:
      - dev-net
    ports:
      - 3000:3000

  queen-dev:
    container_name: queen-dev
    build:
      context: services/queen
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ./services/mona/src/mona/models/generated:/mona-models
      - ./services/panther/src/panther/models/generated:/panther-models
      - ./services/fox/src/interfaces/generated:/fox-models
      - ./services/joker/app/interfaces/generated:/joker-models
      - ./infra/es/generated:/es-mapping
    networks:
      - dev-net

  es-dev:
    image: phantom-elasticsearch
    container_name: es-dev
    build:
      context: infra/es
      dockerfile: Dockerfile
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data-dev:/usr/share/elasticsearch/data
    networks:
      - dev-net
    # ports:
    #   - 9200:9200
    restart: always

  nginx-dev:
    container_name: nginx-dev
    image: nginx:1.29.6-alpine
    volumes:
      - ${DATA_DIR}:/usr/share/nginx/html
      - ./infra/nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 38080:38080
    networks:
      - dev-net

volumes:
  es-data-dev:

networks:
  dev-net:
    name: phantom-dev-net
    driver: bridge
