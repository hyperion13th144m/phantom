services:
  mona-dev:
    container_name: mona-dev
    build:
      context: .
      dockerfile: mona/Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${SRC_DIR}:/src-dir
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_MONA}:/var/log/mona
      - ./queen:/queen
    networks:
      - dev-net

  panther-dev:
    container_name: panther-dev
    build:
      context: panther
      dockerfile: Dockerfile
    environment:
      ES_URL: http://es01-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_PANTHER}:/var/log/panther
      - ${EXTRA_DATA_DIR}:/extra-dir
    networks:
      - dev-net

  fox-dev:
    container_name: fox-dev
    build:
      context: fox
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      MONA_URL: http://mona-dev:8000
    volumes:
      - ${LOG_DIR_FOX}:/var/log/fox
      - ./test-data/fox:/test-data
    networks:
      - dev-net

  joker-dev:
    container_name: joker-dev
    build:
      context: joker
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es01-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_IMAGE_BASE_URL: /images
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /docs
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}

      # only needed for development environment.
      MONA_URL: http://mona-dev:8000
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
      - ${EXTRA_DATA_DIR}:/extra-dir
    networks:
      - dev-net

  queen-dev:
    container_name: queen-dev
    build:
      context: queen
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ./fox/src/interfaces/generated/json-schema:/fox-schema
      - ./panther/src/panther/generated/json-schema:/panther-schema
      - ./mona/src/mona/generated/json-schema:/mona-schema
      - ./test-data/extracted-archives:/test-data
    networks:
      - dev-net

  es01-dev:
    image: phantom-elasticsearch
    container_name: phantom-elasticsearch-dev
    build:
      dockerfile: es/Dockerfile
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data-dev:/usr/share/elasticsearch/data
    networks:
      - dev-net
    ports:
      - 9200:9200
    restart: always

  nginx-dev:
    container_name: nginx-dev
    image: nginx:1.29.6-alpine
    volumes:
      - ${DATA_DIR}:/usr/share/nginx/html
      - ./nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 38080:38080
    networks:
      - dev-net

volumes:
  es-data-dev:

networks:
  dev-net:
    name: phantom-dev-net
    driver: bridge
