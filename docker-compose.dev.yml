services:
  craw-dev:
    container_name: craw-dev
    build:
      context: craw
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${SRC_DIR}:/src-dir:ro
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_CRAW}:/var/log/craw
      - ./test-data/extracted-archives:/test-data-src
      - ./var/data-debug:/test-data-dst
      - ./queen:/queen
      - ./var/shared/craw-api:/export-api

      # whl は github workflows で作成するので
      # このマウントは不要だけど
      # ローカルで navi プロダクション用ビルドを試すために残しておく
      - ./var/pkgs/craw:/pkgs
    networks:
      - dev-net

  mona-dev:
    container_name: mona-dev
    build:
      context: mona
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR}:/data-dir:ro
      - ${LOG_DIR_MONA}:/var/log/mona
    networks:
      - dev-net

  navi-dev:
    container_name: navi-dev
    build:
      context: navi
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${LOG_DIR_NAVI}:/var/log/navi
      - ./var/shared/craw-api:/craw-api
    networks:
      - dev-net

  skull-dev:
    container_name: skull-dev
    build:
      context: skull
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${LOG_DIR_SKULL}:/var/log/skull
      - ./var/shared/skull-api:/export-api
    networks:
      - dev-net

  panther-dev:
    container_name: panther-dev
    build:
      context: panther
      dockerfile: Dockerfile
    environment:
      ES_URL: http://es-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_PANTHER}:/var/log/panther
      - ${EXTRA_DATA_DIR}:/extra-dir
    networks:
      - dev-net

  fox-dev:
    container_name: fox-dev
    build:
      context: fox
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      MONA_URL: http://mona-dev:8000
    volumes:
      - ${LOG_DIR_FOX}:/var/log/fox
      - ./test-data/fox:/test-data
    networks:
      - dev-net

  joker-dev:
    container_name: joker-dev
    build:
      context: joker
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es-dev:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_IMAGE_BASE_URL: /images
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /docs
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}

      # only needed for development environment.
      MONA_URL: http://mona-dev:8000
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
      - ${EXTRA_DATA_DIR}:/extra-dir
    networks:
      - dev-net

  queen-dev:
    container_name: queen-dev
    build:
      context: queen
      dockerfile: Dockerfile
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
    volumes:
      - ./fox/src/interfaces/generated/json-schema:/fox-schema
      - ./panther/src/panther/models/generated/json-schema:/panther-schema
      - ./craw/src/craw/models/generated/json-schema:/craw-schema
      - ./test-data/extracted-archives:/test-data
      - ./var/pkgs/queen:/pkgs
    networks:
      - dev-net

  es-dev:
    image: phantom-elasticsearch
    container_name: es-dev
    build:
      dockerfile: es/Dockerfile
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data-dev:/usr/share/elasticsearch/data
    networks:
      - dev-net
    ports:
      - 9200:9200
    restart: always

  nginx-dev:
    container_name: nginx-dev
    image: nginx:1.29.6-alpine
    volumes:
      - ${DATA_DIR}:/usr/share/nginx/html
      - ./nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 38080:38080
    networks:
      - dev-net

volumes:
  es-data-dev:

networks:
  dev-net:
    name: phantom-dev-net
    driver: bridge
