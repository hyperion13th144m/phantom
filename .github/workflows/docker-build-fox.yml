name: Build and Push Fox Docker Image

on:
  push:
    branches:
      - main
      #- develop
    paths:
      - 'fox/**'
      - 'queen/**'
      - 'docker/Dockerfile.fox'
      - '.github/workflows/docker-build-fox.yml'
  pull_request:
    branches:
      - main
      #- develop
    paths:
      - 'fox/**'
      - 'queen/**'
      - 'docker/Dockerfile.fox'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-fox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          cd queen
          uv sync

      - name: Run build-all and copy config to generate json for fox directory.
        run: |
          chmod +x ./queen/scripts/build-all.sh ./queen/scripts/build-schema.sh
          ./queen/scripts/build-all.sh -f "./fox/src/interfaces/generated/json-schema"
          mkdir -p ./fox/src/interfaces/generated/config
          cp ./queen/storage-config.json ./fox/src/interfaces/generated/config/storage-config.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install TypeScript build dependencies
        run: |
          cd fox
          npm install

      - name: Run build-schema script to generate ts schema from json schema.
        run: |
          chmod +x ./fox/scripts/build-schema.sh
          ./fox/scripts/build-schema.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/phantom-fox
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./fox
          file: ./fox/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
